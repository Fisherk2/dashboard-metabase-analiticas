# docker-compose.yml — Dashboard Metabase + Colección Analítica
# Orquestación de PostgreSQL 15+ y Metabase OSS
# Documentación completa: specs/spec-infrastructure.md
# =============================================================================

services:
  # ─── PostgreSQL 15+ (Analytical Database) ─────────────────────────────────
  postgres:
    image: postgres:15
    container_name: metabase-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecommerce_net
    restart: unless-stopped
    mem_limit: 1g

  # ─── Metabase OSS (BI Visualization) ──────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: metabase-app
    ports:
      - "${METABASE_PORT}:3000"
    environment:
      MB_DB_TYPE: ${MB_DB_TYPE}
      MB_DB_DBNAME: ${MB_DB_DBNAME}
      MB_DB_PORT: ${MB_DB_PORT}
      MB_DB_USER: ${MB_DB_USER}
      MB_DB_PASS: ${MB_DB_PASS}
      MB_DB_HOST: ${MB_DB_HOST}
    volumes:
      - mb_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce_net
    restart: unless-stopped
    mem_limit: 2g

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  mb_data:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  ecommerce_net:
    driver: bridge
    internal: false  # Allows Metabase port mapping to host
