# docker-compose.yml — PostgreSQL + Metabase
# Full service configuration in F1: Infraestructura
# See specs/spec-infrastructure.md for details
services:
  # PostgreSQL 15+ analytical database
  postgres:
    image: postgres:15-alpine
    container_name: metabase-postgres

  # Metabase OSS BI visualization
  metabase:
    image: metabase/metabase:latest
    container_name: metabase-app
